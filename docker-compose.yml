version: '3.8'

services:
  mailer-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mms-mailer-service
    restart: unless-stopped
    
    # Use host network mode to access host's SMTP server (Exim4)
    # This allows the container to connect to 127.0.0.1:587 on the host
    network_mode: "host"

    env_file:
      - .env

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/mail/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)}).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3

    volumes:
      - ./logs:/app/logs
