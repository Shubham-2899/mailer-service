version: '3.8'

services:
  mailer-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mms-mailer-service
    restart: unless-stopped

    ports:
      - "4000:4000"

    env_file:
      - .env

    networks:
      - mailer-network

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/mail/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)}).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3

    volumes:
      - ./logs:/app/logs

networks:
  mailer-network:
    driver: bridge